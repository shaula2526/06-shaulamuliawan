<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>CRUD User + Unique ID</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      text-align: center;
    }

    input {
      padding: 10px;
      margin: 5px;
      width: 250px;
    }

    button {
      padding: 10px;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 20px auto;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.2);
    }

    .list-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .user-card {
      background: white;
      width: 200px;
      margin: 10px;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    .btn-edit { background: orange; }
    .btn-delete { background: red; }
  </style>

</head>
<body>

<h1>CRUD Data User</h1>

<input type="text" id="search" placeholder="Cari nama..." />

<div class="card">
  <h2>Tambah / Edit User</h2>
  <input type="text" id="nama" placeholder="Nama">
  <input type="number" id="umur" placeholder="Umur">
  <br>
  <button id="submitBtn">Tambah</button>
</div>

<h2>List User</h2>
<div id="userList" class="list-container"></div>

<script>
// ===== STORAGE =====
const STORAGE_KEY = "users_data";

// ===== DATA =====
let users = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
let editId = null;

// ===== GENERATE ID =====
const generateId = () => Date.now().toString();

// ===== SAVE =====
const saveToStorage = () => {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
};

// ===== UTILS =====
const getValue = (id) => document.getElementById(id).value;
const setValue = (id, val) => document.getElementById(id).value = val;

const clearForm = () => {
  setValue("nama", "");
  setValue("umur", "");
};

// ===== COMPONENT =====
const userCard = (user) => {
  return `
    <div class="user-card">
      <h3>${user.nama}</h3>
      <p>Umur: ${user.umur}</p>

      <button class="btn-edit" onclick="editUser('${user.id}')">Edit</button>
      <button class="btn-delete" onclick="deleteUser('${user.id}')">Hapus</button>
    </div>
  `;
};

// ===== RENDER =====
const render = (data = users) => {
  const container = document.getElementById("userList");

  if (data.length === 0) {
    container.innerHTML = "<p>Tidak ada data</p>";
    return;
  }

  container.innerHTML = data.map(userCard).join("");
};

// ===== CRUD =====
const saveUser = () => {
  const nama = getValue("nama");
  const umur = getValue("umur");

  if (!nama || !umur) {
    alert("Isi semua field!");
    return;
  }

  if (editId !== null) {
    // UPDATE
    users = users.map(user =>
      user.id === editId ? { ...user, nama, umur } : user
    );
    editId = null;
    submitBtn.innerText = "Tambah";
  } else {
    // CREATE
    users.push({
      id: generateId(),
      nama,
      umur
    });
  }

  saveToStorage();
  clearForm();
  render();
};

const deleteUser = (id) => {
  users = users.filter(user => user.id !== id);
  saveToStorage();
  render();
};

// ===== EDIT =====
const editUser = (id) => {
  const user = users.find(u => u.id === id);

  setValue("nama", user.nama);
  setValue("umur", user.umur);

  editId = id;
  submitBtn.innerText = "Update";
};

// ===== SEARCH =====
document.getElementById("search").addEventListener("input", (e) => {
  const keyword = e.target.value.toLowerCase();

  const filtered = users.filter(u =>
    u.nama.toLowerCase().includes(keyword)
  );

  render(filtered);
});

// ===== EVENT =====
const submitBtn = document.getElementById("submitBtn");
submitBtn.addEventListener("click", saveUser);

// ===== INIT =====
render();

</script>

</body>
</html>
