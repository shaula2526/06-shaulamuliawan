<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Data Mahasiswa</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        table {
            width: 50%;
            margin: auto;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #333;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

    <h1>Data Mahasiswa</h1>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nama</th>
            </tr>
        </thead>
        <tbody id="data-table">
            <!-- Data dari JSON akan masuk ke sini -->
        </tbody>
    </table>

    <script>
        // =========================
        // DATA JSON
        // =========================
        const mahasiswa = [
            { id: 1, nama: "Andi" },
            { id: 2, nama: "Budi" },
            { id: 3, nama: "Citra" }
        ];

        // =========================
        // FUNCTION TAMPILKAN DATA
        // =========================
        function tampilkanTabel(data) {
            return data.map(item => `
                <tr>
                    <td>${item.id}</td>
                    <td>${item.nama}</td>
                </tr>
            `).join("");
        }

        // =========================
        // RENDER KE TABLE
        // =========================
        document.getElementById("data-table").innerHTML = tampilkanTabel(mahasiswa);
    </script>

</body>
</html>
