<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>List & Card DRY</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: center;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      width: 200px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    .card h3 {
      margin: 0;
      color: #333;
    }

    .card p {
      color: #666;
    }

    .list {
      margin-top: 30px;
    }
  </style>
</head>
<body>

<h1>Data User</h1>

<div id="cardContainer" class="container"></div>

<div class="list">
  <h2>List User</h2>
  <ul id="listContainer"></ul>
</div>

<script>
  // =========================
  // DATA (SCALABLE)
  // =========================
  const users = [
    { id: 1, name: "Shaula", age: 20 },
    { id: 2, name: "Aji", age: 22 },
    { id: 3, name: "Citra", age: 19 }
  ];

  // =========================
  // COMPONENT (REUSE)
  // =========================
  function createCard(user) {
    return `
      <div class="card">
        <h3>${user.name}</h3>
        <p>Umur: ${user.age}</p>
      </div>
    `;
  }

  function createListItem(user) {
    return `<li>${user.name} - ${user.age} tahun</li>`;
  }

  // =========================
  // RENDER (MODULAR)
  // =========================
  function renderCards(data) {
    const container = document.getElementById("cardContainer");
    container.innerHTML = data.map(createCard).join("");
  }

  function renderList(data) {
    const list = document.getElementById("listContainer");
    list.innerHTML = data.map(createListItem).join("");
  }

  // =========================
  // INIT (DRY)
  // =========================
  function init() {
    renderCards(users);
    renderList(users);
  }

  init();
</script>

</body>
</html>
