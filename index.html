<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Mahasiswa</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#f8fafc; --card:#ffffff; --text:#0f172a; --muted:#64748b;
      --primary:#6366f1; --primary-2:#4f46e5;
      --danger:#ef4444; --warn:#f59e0b; --border:#e2e8f0;
    }
    body.dark{
      --bg:#0b1220; --card:#0f172a; --text:#e5e7eb; --muted:#94a3b8;
      --primary:#818cf8; --primary-2:#6366f1;
      --danger:#f87171; --warn:#fbbf24; --border:#1f2937;
    }

    *{box-sizing:border-box; margin:0; padding:0; font-family:'Inter',sans-serif}
    body{background:var(--bg); color:var(--text)}

    .container{max-width:1000px; margin:auto; padding:20px}
    .topbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:16px}
    h1{font-size:26px}

    .btn{
      padding:10px 12px; border-radius:8px; border:none; cursor:pointer;
      background:var(--primary); color:#fff; font-weight:600; transition:.2s
    }
    .btn:hover{background:var(--primary-2)}
    .btn-ghost{background:transparent; color:var(--text); border:1px solid var(--border)}
    .btn-warn{background:var(--warn)}
    .btn-danger{background:var(--danger)}

    .card{
      background:var(--card); border:1px solid var(--border);
      border-radius:12px; box-shadow:0 6px 18px rgba(0,0,0,.06);
      padding:16px; margin-bottom:16px
    }

    input, select{
      width:100%; padding:12px; border-radius:8px; border:1px solid var(--border);
      background:transparent; color:var(--text); outline:none
    }
    input:focus, select:focus{border-color:var(--primary)}

    .grid{display:grid; gap:10px}
    .list{display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px}

    .meta{font-size:13px; color:var(--muted)}
    .actions{display:flex; gap:6px; margin-top:10px}

    .center{min-height:100vh; display:flex; align-items:center; justify-content:center}
    .login{width:320px}
  </style>
</head>
<body>

<!-- 🔐 LOGIN PAGE -->
<div id="loginPage" class="center">
  <div class="card login">
    <h2 style="margin-bottom:10px">Login Admin</h2>
    <div class="grid">
      <input type="text" id="username" placeholder="Username">
      <input type="password" id="password" placeholder="Password">
      <button class="btn" onclick="login()">Login</button>
    </div>
  </div>
</div>

<!-- 📊 DASHBOARD -->
<div id="app" style="display:none">
  <div class="container">
    <div class="topbar">
      <h1>📊 Dashboard Mahasiswa</h1>
      <div style="display:flex; gap:8px">
        <button class="btn-ghost btn" onclick="toggleDark()">🌙 Dark</button>
        <button class="btn-ghost btn" onclick="logout()">Logout</button>
      </div>
    </div>

    <input type="text" id="search" placeholder="Cari nama / NIM..." class="card">

    <div class="card">
      <h3 style="margin-bottom:10px">Tambah / Edit</h3>
      <div class="grid">
        <input type="text" id="nim" placeholder="NIM">
        <input type="text" id="nama" placeholder="Nama">
        <input type="number" id="umur" placeholder="Umur">
        <select id="jurusan">
          <option value="">Pilih Jurusan</option>
          <option>Informatika</option>
          <option>Sistem Informasi</option>
          <option>Manajemen</option>
          <option>Akuntansi</option>
        </select>
        <button id="submitBtn" class="btn">Tambah</button>
      </div>
    </div>

    <div id="userList" class="list"></div>
  </div>
</div>

<script>
// ===== AUTH (sederhana) =====
const ADMIN = { user:"admin", pass:"123" };
const isLogin = () => localStorage.getItem("isLogin")==="true";

const login = () => {
  const u = username.value.trim();
  const p = password.value.trim();
  if(u===ADMIN.user && p===ADMIN.pass){
    localStorage.setItem("isLogin","true");
    initView();
  }else alert("Login gagal!");
};

const logout = () => {
  localStorage.removeItem("isLogin");
  initView();
};

// ===== DARK MODE =====
const applyTheme = () => {
  const dark = localStorage.getItem("dark")==="true";
  document.body.classList.toggle("dark", dark);
};
const toggleDark = () => {
  const now = localStorage.getItem("dark")==="true";
  localStorage.setItem("dark", (!now).toString());
  applyTheme();
};

// ===== DATA =====
const KEY="mahasiswa_data";
let users = JSON.parse(localStorage.getItem(KEY)) || [];
let editId=null;

const save=()=>localStorage.setItem(KEY, JSON.stringify(users));

// ===== UTILS =====
const get=id=>document.getElementById(id).value.trim();
const set=(id,v)=>document.getElementById(id).value=v;
const clear=()=>["nim","nama","umur","jurusan"].forEach(i=>set(i,""));

// ===== RENDER =====
const card=u=>`
<div class="card">
  <h3>${u.nama}</h3>
  <div class="meta">NIM: ${u.nim}</div>
  <div class="meta">Umur: ${u.umur}</div>
  <div class="meta">Jurusan: ${u.jurusan}</div>
  <div class="actions">
    <button class="btn btn-warn" onclick="editUser('${u.id}')">Edit</button>
    <button class="btn btn-danger" onclick="deleteUser('${u.id}')">Hapus</button>
  </div>
</div>`;

const render=(data=users)=>{
  userList.innerHTML = data.length ? data.map(card).join("") : "<p>Tidak ada data</p>";
};

// ===== CRUD =====
const saveUser=()=>{
  const nim=get("nim"), nama=get("nama"), umur=get("umur"), jurusan=get("jurusan");
  if(!nim||!nama||!umur||!jurusan) return alert("Lengkapi semua!");

  if(editId){
    users = users.map(u=>u.id===editId?{...u,nim,nama,umur,jurusan}:u);
    editId=null; submitBtn.innerText="Tambah";
  }else{
    users.push({id:Date.now().toString(), nim,nama,umur,jurusan});
  }
  save(); clear(); render();
};

const deleteUser=id=>{
  users=users.filter(u=>u.id!==id);
  save(); render();
};

const editUser=id=>{
  const u=users.find(x=>x.id===id);
  set("nim",u.nim); set("nama",u.nama); set("umur",u.umur); set("jurusan",u.jurusan);
  editId=id; submitBtn.innerText="Update";
};

// ===== SEARCH =====
search?.addEventListener("input",e=>{
  const k=e.target.value.toLowerCase();
  render(users.filter(u=>u.nama.toLowerCase().includes(k)||u.nim.toLowerCase().includes(k)));
});

// ===== INIT VIEW =====
const initView=()=>{
  applyTheme();
  if(isLogin()){
    loginPage.style.display="none";
    app.style.display="block";
    render();
  }else{
    loginPage.style.display="flex";
    app.style.display="none";
  }
};

submitBtn?.addEventListener("click", saveUser);
initView();
</script>

</body>
</html>
